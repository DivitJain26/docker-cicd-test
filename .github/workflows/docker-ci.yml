name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 4. Build image (tests run here if in Dockerfile)
    - name: Build Docker image
      run: docker build -t yourusername/app:latest .

    # 5. Run container tests separately (optional but better)
    - name: Run tests
      run: |
        docker run --rm yourusername/app:latest npm test

    # 6. Push image to Docker Hub
    - name: Push Docker image
      run: docker push yourusername/app:latest